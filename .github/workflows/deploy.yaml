name: Portfolio Deploy

on:
  Push:
    branches: [deploy]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      -name: Checkout repository
      uses: actions/checkout@v4

      -name:  Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 25.2.1

      -name:  Install dependencies
      run: npm install

      -name:  Install dependencies
      run: npm run build
      

    